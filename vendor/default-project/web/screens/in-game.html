<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="tsic-screen" content="InGame">
  <!-- Declares this page as the SPA shell. router.js sees this and skips
       the legacy window.location.replace redirect on UI.Screen.Changed;
       shared/screen-manager.js takes over routing and mounts registered
       screens as overlays. Unmigrated screens still fall back to a real
       navigation via the manager. -->
  <meta name="tsic-shell" content="true">
  <title>TSIC — In Game</title>
  <link rel="stylesheet" href="/shared/base.css">
  <link rel="stylesheet" href="/shared/components.css">
  <link rel="stylesheet" href="/shared/hud.css">
  <link rel="stylesheet" href="/shared/screen-manager.css">
  <!-- Core shared scripts — parsed once on shell load, reused by every
       overlay that mounts later. Order matters: bridge & runtime first,
       then helpers, then router/manager, then per-screen modules. -->
  <script src="/shared/tsic-bridge.js" defer></script>
  <script src="/shared/tsic-runtime.js" defer></script>
  <script src="/shared/dom.js" defer></script>
  <script src="/shared/icons.js" defer></script>
  <script src="/shared/router.js" defer></script>
  <script src="/shared/tsic-focus.js" defer></script>
  <script src="/shared/tsic-dropdown.js" defer></script>
  <script src="/shared/catalog.js" defer></script>
  <script src="/shared/inventory.js" defer></script>
  <script src="/shared/context-menu.js" defer></script>
  <script src="/shared/tab-filter.js" defer></script>
  <script src="/shared/behavior-bar.js" defer></script>
  <script src="/shared/recipe-info.js" defer></script>
  <script src="/shared/recipe-station.js" defer></script>
  <script src="/shared/storage-shell.js" defer></script>
  <script src="/shared/screen-manager.js" defer></script>
  <script src="/shared/hud.js" defer></script>
  <!-- Per-screen modules. Each registers itself with TSIC.registerScreen.
       Add a screen here when you migrate it; unmigrated names fall back
       to legacy /screens/<name>.html navigation. -->
  <script src="/shared/screens/pause-menu.js" defer></script>
  <script src="/shared/screens/bug-report.js" defer></script>
  <script src="/shared/screens/inventory.js" defer></script>
  <script src="/shared/screens/crafting.js" defer></script>
  <script src="/shared/screens/production.js" defer></script>
  <script src="/shared/screens/construction.js" defer></script>
  <script src="/shared/fow-lookup.js" defer></script>
  <script src="/shared/screens/map.js" defer></script>
  <!-- Store terminals: shared modules + the Terminal screen. -->
  <script src="/shared/terminal/constants.js" defer></script>
  <script src="/shared/terminal/boot.js" defer></script>
  <script src="/shared/terminal/catalog.js" defer></script>
  <script src="/shared/terminal/capabilities.js" defer></script>
  <script src="/shared/terminal/runtime.js" defer></script>
  <script src="/shared/terminal/console-core.js" defer></script>
  <script src="/shared/terminal/shells/tier1-text.js" defer></script>
  <script src="/shared/terminal/shells/tier2-windowed.js" defer></script>
  <script src="/shared/terminal/shells/tier3-scp.js" defer></script>
  <script src="/shared/screens/terminal.js" defer></script>
</head><body>
  <!-- HUD chrome is injected by hud.js. Screen overlays mount under
       #screen-overlay-host (created by screen-manager.js). -->
</body></html>
