<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="tsic-screen" content="TestHealthBar">
  <meta name="tsic-debug" content="true">
  <title>Test: health vial</title>
  <!-- Test-only host for the LIVE health vial (shared/hud-health.js +
       shared/hud-liquid-bar.js). In production hud.js creates the #hud-health
       shell and positions it; here we provide the minimal shell so the
       component can be exercised in isolation.

       DO NOT add rendering logic to this file. The vial is rendered by
       shared/hud-liquid-bar.js (mounted by shared/hud-health.js) — this page
       only hosts it. -->
  <link rel="stylesheet" href="/shared/base.css">
  <!-- No tsic-bridge.js / tsic-runtime.js: in the spa-test-runner the harness
       stamps a mock window.tsic in beforeParse, and tsic-bridge.js would
       overwrite it. -->
  <script src="/shared/hud-liquid-bar.js" defer></script>
  <script src="/shared/hud-health.js" defer></script>
</head><body>
  <!-- Mirror the positioning hud.js gives #hud-health. -->
  <div id="hud-health" style="position:fixed; left:24px; bottom:30px; width:48px; --vial-h:200px;"></div>
</body></html>
