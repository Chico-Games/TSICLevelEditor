# Drift guard: fail if config/biomes.json is out of date with the vendored default-project
# mod definitions (vendor/default-project). Run on PRs and pushes that touch either side.
# Fix locally with:  node tools/sync-biomes.mjs
name: Biome sync check

on:
  push:
    branches: [master]
    paths:
      - 'vendor/default-project/biome_definitions/**'
      - 'config/biomes.json'
      - 'tools/sync-biomes.mjs'
  pull_request:
    paths:
      - 'vendor/default-project/biome_definitions/**'
      - 'config/biomes.json'
      - 'tools/sync-biomes.mjs'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify config/biomes.json is in sync with the default mod
        run: node tools/sync-biomes.mjs --check
