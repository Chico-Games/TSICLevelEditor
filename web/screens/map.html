<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="tsic-screen" content="Map">
  <meta name="tsic-input-mode" content="InputMode.Menu.Map">
  <title>Map</title>
  <link rel="stylesheet" href="/shared/base.css">
  <link rel="stylesheet" href="/shared/components.css">
  <link rel="stylesheet" href="/shared/hud.css">
    <script src="/shared/tsic-bridge.js" defer></script>
  <script src="/shared/tsic-runtime.js" defer></script>
  <script src="/shared/router.js" defer></script>
  <script src="/shared/tsic-focus.js" defer></script>
  <script src="/shared/tsic-dropdown.js" defer></script>
  <script src="/shared/hud.js" defer></script>
  <script src="/shared/icons.js" defer></script>
  <script src="/shared/fow-lookup.js" defer></script>
  <style>
    #map-root {
      position: fixed; inset: 0;
      background: #d4c19d;
      color: var(--cat-ink-soft);
      font-family: 'Consolas', monospace;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #map-title {
      letter-spacing: 4px; font-size: 14px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--tsic-border);
      background: rgba(35,31,24,0.35);
      flex: 0 0 auto;
    }
    #map-viewport {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }
    #map-viewport.dragging { cursor: grabbing; }
    #map-content {
      position: absolute; left: 0; top: 0;
      transform-origin: 0 0;
      image-rendering: pixelated;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      background-color: white;
      box-shadow: 0 3px 12px rgba(0,0,0,0.2);
    }
    /* Lifted paper shadow — two diagonal shadows below the poster that
       simulate curled corners lifting off the surface. */
    #map-content::before {
      content: "";
      position: absolute;
      width: 100%; height: 4%;
      left: 0; bottom: -4%;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(177deg, rgba(0,0,0,0.22) 10%, transparent 50%),
        linear-gradient(-177deg, rgba(0,0,0,0.22) 10%, transparent 50%);
      background-size: 49% 100%, 49% 100%;
      background-position: 2% 0, 98% 0;
      background-repeat: no-repeat;
    }
    /* Fold panel overlay — edge shadows simulate a 2×3 folded paper grid,
       plus subtle inner-edge darkening for paper thickness. */
    #map-content::after {
      content: "";
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.1) 0.5%, rgba(0,0,0,0.15) 1.2%, transparent 1.2%),
        linear-gradient(to bottom, rgba(255,255,255,0.1) 0.5%, rgba(0,0,0,0.15) 1.2%, transparent 1.2%),
        linear-gradient(to bottom, rgba(255,255,255,0.1) 0.5%, rgba(0,0,0,0.15) 1.2%, transparent 1.2%),
        linear-gradient(265deg, rgba(0,0,0,0.2), transparent 10%),
        linear-gradient(5deg, rgba(0,0,0,0.2), transparent 15%),
        linear-gradient(-5deg, rgba(0,0,0,0.1), transparent 10%),
        linear-gradient(5deg, rgba(0,0,0,0.1), transparent 10%),
        linear-gradient(-265deg, rgba(0,0,0,0.2), transparent 10%),
        linear-gradient(-5deg, rgba(0,0,0,0.2), transparent 15%),
        linear-gradient(266deg, rgba(0,0,0,0.2), transparent 10%);
      background-size:
        50% 100%, 100% 33.3333%, 100% 33.3333%,
        50% 33.3333%, 50% 33.3333%, 50% 33.3333%,
        50% 33.3333%, 50% 33.3333%, 50% 33.3333%, 50% 33.3333%;
      background-position:
        right top, left center, left bottom,
        left top, left top, right top,
        left center, right center, right center, left bottom;
      background-repeat: no-repeat;
    }
    #world-tex, #fow-tex, #overlay,
    #debug-height-tex, #debug-maze-tex {
      position: absolute; left: 0; top: 0;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    /* Explicit stacking — z-index lifts the SVG overlay above the texture
       stack. Players render via Canvas 2D (#player-canvas) because CSS
       transform:rotate is broken in UL 1.4; canvas rotation works. */
    #world-tex          { z-index: 1; image-rendering: pixelated; }
    #debug-height-tex   { z-index: 2; }
    #debug-maze-tex     { z-index: 3; }
    #debug-all-tex      { z-index: 4; }
    #fow-tex            { z-index: 5; }
    #overlay            { z-index: 6; }
    /* Debug overlays — toggled by WebUI.Map.DebugHeight / WebUI.Map.DebugMazeRegions
       console commands; sticky `tsic.debug.Map.Overlay` event drives display. The
       1px-per-tile texture is stretched to world bounds via CSS w/h; `pixelated`
       keeps the per-tile cells crisp at all zoom levels. */
    #debug-height-tex, #debug-maze-tex, #debug-all-tex {
      image-rendering: pixelated;
      display: none;
    }
    /* `opacity: 0.85` and `mix-blend-mode: multiply` both promote the element
       to a stacking-context layer that fails to composite back
       (see CLAUDE.md → TSICWebUI). The FOW texture bakes alpha into pixel
       data: explored = transparent, unexplored = opaque black. */
    #fow-tex   { image-rendering: pixelated; }
    .ic { cursor: default; }
    .ic.clickable { cursor: pointer; pointer-events: auto; }
    .ic-spawn   { fill: #f1c40f; }
    .ic-tele    { fill: #2ecc71; }
    .ic-death   { fill: #9b59b6; }
    .ic-land    { fill: #e74c3c; }
    .ic-other   { fill: #bbbbbb; }
    #player-canvas {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
    }
    .ping       { stroke: #ffcc00; }
    #legend {
      flex: 0 0 auto;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 2px;
      border-top: 1px solid var(--tsic-border);
      background: rgba(35,31,24,0.35);
      display: flex; gap: 18px; flex-wrap: wrap;
    }
    #legend .swatch { display:inline-block; width:10px; height:10px; vertical-align:middle; margin-right:4px; }
    #hint { margin-left: auto; color: rgba(108, 94, 73, 0.6); }
    #empty {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      color: var(--cat-ink-soft);
    }
    /* Gamepad crosshair — hidden by default; shown via .pad-cursor on viewport. */
    #pad-cursor {
      position: absolute; left: 50%; top: 50%;
      width: 28px; height: 28px; margin: -14px 0 0 -14px;
      border: 2px solid #ffcc00; border-radius: 50%;
      pointer-events: none; display: none;
      box-shadow: 0 0 4px rgba(255,204,0,0.6);
    }
    #map-viewport.pad-cursor #pad-cursor { display: block; }
    .ic-cluster { fill: rgba(35,31,24,0.35); stroke: #ffffff; }
    .ic-cluster-text { fill: #ffffff; font-family: 'Consolas', monospace; font-size: 14px; }
    /* World-bounds outline. Sized in setBounds(); non-scaling stroke so the
       border stays a constant 2 screen pixels across the whole zoom range. */
    #world-bounds {
      fill: none;
      stroke: #5a4a30;
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }
    .bound-coord {
      fill: rgba(90, 74, 48, 0.85);
      font-family: 'Consolas', monospace;
      pointer-events: none;
    }
    /* Ctrl+Click teleport-cheat flash ring. Animates fill-opacity + r so
       the circle pulses outward and fades over 600ms. */
    @keyframes tp-flash {
      from { fill-opacity: 1;   r: 4;  }
      to   { fill-opacity: 0;   r: 24; }
    }
    .tp-flash {
      fill: #f1c40f;
      stroke: #ffffff;
      stroke-width: 1;
      animation: tp-flash 600ms ease-out forwards;
      pointer-events: none;
    }
    /* Hover-info chip — follows mouse / sits next to gamepad crosshair.
       `white-space: pre` preserves explicit newlines (the tile-hover text uses
       \n to put biome / floor / coords on three lines) while still keeping
       single-line entity-hover strings on one line. */
    #hover-chip {
      position: absolute;
      left: 0; top: 0;
      padding: 3px 7px;
      background: rgba(35,31,24,0.85);
      color: #f3e8c8;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      line-height: 1.35;
      border: 1px solid #5a4a30;
      pointer-events: none;
      white-space: pre;
      display: none;
      z-index: 5;
    }
  </style>
</head><body>
  <div id="map-root">
    <div id="map-title">MAP</div>
    <div id="map-viewport" data-cursor="map">
      <div id="map-content">
        <img id="world-tex" src="/runtime/world-map.imgsrc">
        <img id="debug-height-tex" src="/runtime/world-debug-height.imgsrc">
        <img id="debug-maze-tex"   src="/runtime/world-debug-maze.imgsrc">
        <img id="debug-all-tex"    src="/runtime/world-debug-all.imgsrc">
        <img id="fow-tex"   src="/runtime/fow.imgsrc">
        <svg id="overlay" xmlns="http://www.w3.org/2000/svg">
          <rect id="world-bounds" x="0" y="0" width="0" height="0"></rect>
          <g id="g-icons"></g>
          <g id="g-pings"></g>
          <g id="g-coords"></g>
          <g id="g-cheat-fx"></g>
        </svg>
      </div>
      <div id="empty">Waiting for map data…</div>
      <canvas id="player-canvas"></canvas>
      <div id="pad-cursor"></div>
      <div id="hover-chip"></div>
    </div>
    <div id="legend">
      <span><span class="swatch" style="background:#3498db;"></span>Player</span>
      <span><span class="swatch" style="background:#f1c40f;"></span>Spawn</span>
      <span><span class="swatch" style="background:#2ecc71;"></span>Teleporter</span>
      <span><span class="swatch" style="background:#e74c3c;"></span>Landmark</span>
      <span><span class="swatch" style="background:#ffcc00;"></span>Ping</span>
      <span id="hint" data-base="drag = pan · wheel = zoom · R = reset · Esc = close · RMB = ping · WebUI.Map.DebugHeight / DebugMazeRegions">drag = pan · wheel = zoom · R = reset · Esc = close · RMB = ping · WebUI.Map.DebugHeight / DebugMazeRegions</span>
    </div>
  </div>
  <script>
    (function boot() {
      if (!window.tsic) { setTimeout(boot, 16); return; }

      // 1 px per cm — UE world units are cm. We rely on transform to scale.
      const PX_PER_CM = 1;
      // Target screen-pixel size for icons/players/pings. The actual SVG
      // geometry is scaled by 1/state.scale so these stay readable as the
      // map zooms.
      const ICON_PX = 8;
      const PING_HALF_PX = 8;
      const PING_STROKE_PX = 3;
      // Screen-pixel radius the hover picker uses to grab a target near the
      // mouse cursor or the gamepad crosshair. Converted to local units via
      // 1/state.scale so it stays a constant on-screen distance at any zoom.
      const PICK_RADIUS_PX = 16;
      let bounds = { minX: 0, minY: 0, maxX: 0, maxY: 0, hasData: false };
      // mouseX/mouseY are viewport-relative; -1 means "no mouse over the
      // viewport" (initial state or after mouseleave). isPad mirrors the
      // .pad-cursor class on the viewport.
      let MIN_SCALE = 0.05;
      const MAX_SCALE = 16;
      const state = { panX: 0, panY: 0, scale: 1, isPad: false, mouseX: -1, mouseY: -1 };
      // Latest payloads kept so we can re-render after pan/zoom changes
      // (so counter-scaled geometry stays correct).
      let latestSnapshot = null;
      let latestPings = null;
      // Static per-tile world data from UI.Map.TileGrid. tileGrid.biomes /
      // tileGrid.heights are flat arrays of length worldSize*worldSize indexed
      // by (north * worldSize + east). RLE is expanded once on receipt so
      // hover lookups are O(1) per mouse move.
      let tileGrid = null;
      // Fog-of-war hover gate, built from UI.Map.FowGrid (see shared/fow-lookup.js).
      // null = no fog data yet → fail open (never suppress the hover panel).
      let fowGrid = null;

      function el(tag, attrs) {
        const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
        if (attrs) for (const k in attrs) e.setAttribute(k, attrs[k]);
        return e;
      }

      // North-up projection of the UE world onto the map texture.
      //   UE world: +X = North (forward), +Y = East (right).
      //   Texture pixel layout (after FColorArr::Add2DArrayAtPosition's Y-flip):
      //     col = East = world Y          → screen horizontal
      //     row = (size-1) - North        → screen vertical (top = +North)
      //   So: local.x maps to world Y, local.y maps to (maxX - world X).
      // bounds.{min,max}X are the world-X (North) range, bounds.{min,max}Y the
      // world-Y (East) range — i.e. they match UE world coordinates, not screen
      // axes. Don't be fooled by the "X / Y" labels; this preserves the C++
      // snapshot's payload exactly.
      function worldToLocal(wx, wy) {
        const x = (wy - bounds.minY) * PX_PER_CM;
        const y = (bounds.maxX - wx) * PX_PER_CM;
        return { x, y };
      }

      function localToWorld(lx, ly) {
        const wy = bounds.minY + lx / PX_PER_CM;
        const wx = bounds.maxX - ly / PX_PER_CM;
        return { wx, wy };
      }

      function applyTransform() {
        const c = document.getElementById('map-content');
        c.style.transform =
          `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
      }

      function updateMinScale() {
        const vp = document.getElementById('map-viewport');
        if (!bounds.hasData || !vp) return;
        const widthCm  = (bounds.maxY - bounds.minY) * PX_PER_CM;
        const heightCm = (bounds.maxX - bounds.minX) * PX_PER_CM;
        if (widthCm <= 0 || heightCm <= 0) return;
        const sx = vp.clientWidth  / widthCm;
        const sy = vp.clientHeight / heightCm;
        MIN_SCALE = Math.min(sx, sy) * 0.95;
      }

      function fitToBounds() {
        const vp = document.getElementById('map-viewport');
        if (!bounds.hasData || !vp) return;
        const widthCm  = (bounds.maxY - bounds.minY) * PX_PER_CM;
        const heightCm = (bounds.maxX - bounds.minX) * PX_PER_CM;
        if (widthCm <= 0 || heightCm <= 0) return;
        const sx = vp.clientWidth  / widthCm;
        const sy = vp.clientHeight / heightCm;
        MIN_SCALE = Math.min(sx, sy) * 0.95;
        state.scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, Math.min(sx, sy) * 0.95));
        state.panX = (vp.clientWidth  - widthCm  * state.scale) / 2;
        state.panY = (vp.clientHeight - heightCm * state.scale) / 2;
        applyTransform();
        // Icon/player/ping geometry depends on state.scale.
        if (latestSnapshot) rerender();
      }

      function setBounds(minB, maxB) {
        const minX = minB && typeof minB.X === 'number' ? minB.X : 0;
        const minY = minB && typeof minB.Y === 'number' ? minB.Y : 0;
        const maxX = maxB && typeof maxB.X === 'number' ? maxB.X : 0;
        const maxY = maxB && typeof maxB.Y === 'number' ? maxB.Y : 0;
        const changed = bounds.minX !== minX || bounds.minY !== minY
                     || bounds.maxX !== maxX || bounds.maxY !== maxY;
        bounds = { minX, minY, maxX, maxY, hasData: (maxX - minX) > 0 && (maxY - minY) > 0 };
        if (changed && bounds.hasData) {
          const c = document.getElementById('map-content');
          const w = (bounds.maxY - bounds.minY) * PX_PER_CM;
          const h = (bounds.maxX - bounds.minX) * PX_PER_CM;
          const pad = Math.round(Math.min(w, h) * 0.04);
          c.style.padding = `${pad}px`;
          c.style.width  = `${w}px`;
          c.style.height = `${h}px`;
          for (const id of ['world-tex', 'fow-tex', 'debug-height-tex', 'debug-maze-tex', 'debug-all-tex']) {
            const img = document.getElementById(id);
            if (!img) continue;
            img.style.width  = `${w}px`;
            img.style.height = `${h}px`;
          }
          for (const sid of ['overlay']) {
            const svg = document.getElementById(sid);
            if (!svg) continue;
            svg.setAttribute('width',  w);
            svg.setAttribute('height', h);
            svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
          }
          const wb = document.getElementById('world-bounds');
          if (wb) {
            wb.setAttribute('width',  w);
            wb.setAttribute('height', h);
          }
          fitToBounds();
        }
      }

      function categoryClass(cat) {
        const c = (cat || '').toLowerCase();
        if (c === 'spawn' || c === 'spawnpoint') return 'ic-spawn';
        if (c === 'fasttravel' || c === 'teleporter') return 'ic-tele';
        if (c === 'deathbox') return 'ic-death';
        if (c === 'landmark') return 'ic-land';
        return 'ic-other';
      }

      // Cluster icons within a radius of N screen pixels when zoom is low.
      // Local radius in world-coordinates: screenPx / state.scale.
      const CLUSTER_SCREEN_PX = 32;
      function clusterIcons(icons) {
        if (state.scale >= 0.5) return { clusters: [], singletons: icons || [] };
        const radiusLocal = CLUSTER_SCREEN_PX / state.scale;
        const remaining = (icons || []).slice();
        const clusters = [];
        const singletons = [];
        while (remaining.length > 0) {
          const seed = remaining.shift();
          const sx = (seed.Position && seed.Position.X) || 0;
          const sy = (seed.Position && seed.Position.Y) || 0;
          const group = [seed];
          for (let i = remaining.length - 1; i >= 0; i--) {
            const ic = remaining[i];
            const x = (ic.Position && ic.Position.X) || 0;
            const y = (ic.Position && ic.Position.Y) || 0;
            if (Math.hypot(x - sx, y - sy) <= radiusLocal) {
              group.push(ic);
              remaining.splice(i, 1);
            }
          }
          if (group.length === 1) {
            singletons.push(seed);
          } else {
            let cx = 0, cy = 0;
            for (const g of group) {
              cx += (g.Position && g.Position.X) || 0;
              cy += (g.Position && g.Position.Y) || 0;
            }
            clusters.push({ x: cx / group.length, y: cy / group.length, count: group.length });
          }
        }
        return { clusters, singletons };
      }

      function renderIcons(icons) {
        const g = document.getElementById('g-icons');
        g.textContent = '';
        const inv = state.scale > 0 ? (1 / state.scale) : 1;
        const r = ICON_PX * inv;
        const sw = 1 * inv;
        const { clusters, singletons } = clusterIcons(icons);
        for (const ic of singletons) {
          const pos = worldToLocal((ic.Position && ic.Position.X) || 0,
                                   (ic.Position && ic.Position.Y) || 0);
          const c = (ic.Category || '').toLowerCase();
          const isClickable = c === 'fasttravel' && (ic.EntityId | 0) > 0;
          const circle = el('circle', {
            cx: pos.x, cy: pos.y, r: r,
            class: `ic ${categoryClass(ic.Category)}${isClickable ? ' clickable' : ''}`,
            stroke: '#000', 'stroke-width': sw,
          });
          if (isClickable) {
            circle.setAttribute('data-entity-id', String(ic.EntityId | 0));
            circle.addEventListener('click', (ev) => {
              ev.stopPropagation();
              tsic.publishMessage('UI.Cmd.Teleporter.Travel', {
                FromId: 0, ToId: parseInt(circle.dataset.entityId, 10) || 0,
              });
            });
          }
          const title = el('title');
          title.textContent = ic.Label || ic.Category || ic.IconId || '';
          circle.appendChild(title);
          g.appendChild(circle);
        }
        const clusterR = ICON_PX * 1.5 * inv;
        for (const cl of clusters) {
          const pos = worldToLocal(cl.x, cl.y);
          const circle = el('circle', {
            cx: pos.x, cy: pos.y, r: clusterR,
            class: 'ic-cluster', 'stroke-width': sw,
          });
          const text = el('text', {
            x: pos.x, y: pos.y + 5 * inv,
            'text-anchor': 'middle', class: 'ic-cluster-text',
            'font-size': 14 * inv,
          });
          text.textContent = String(cl.count);
          const title = el('title');
          title.textContent = `${cl.count} POIs (zoom in to expand)`;
          g.appendChild(circle);
          g.appendChild(text);
          circle.appendChild(title);
        }
      }

      // Player markers rendered via Canvas 2D in #map-viewport so we don't
      // pay the DOM-per-marker overhead at high player counts.
      let latestPlayers = [];

      function worldToScreen(wx, wy) {
        const local = worldToLocal(wx, wy);
        return {
          x: state.panX + local.x * state.scale,
          y: state.panY + local.y * state.scale,
        };
      }

      function drawPlayerArrow(ctx, x, y, yawDeg, color, sz) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate((yawDeg - 90) * Math.PI / 180);
        var s = sz / 8;
        ctx.beginPath();
        ctx.moveTo(8 * s, 0);
        ctx.lineTo(-4 * s, -5 * s);
        ctx.lineTo(-2 * s, 0);
        ctx.lineTo(-4 * s, 5 * s);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      function drawPlayerDot(ctx, x, y, color, radius) {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      function redrawPlayerCanvas() {
        const cvs = document.getElementById('player-canvas');
        if (!cvs) return;
        const vp = document.getElementById('map-viewport');
        const w = vp.clientWidth;
        const h = vp.clientHeight;
        if (cvs.width !== w || cvs.height !== h) {
          cvs.width = w;
          cvs.height = h;
        }
        const ctx = cvs.getContext('2d');
        ctx.clearRect(0, 0, w, h);
        if (!bounds.hasData) return;
        for (let i = 0; i < latestPlayers.length; i++) {
          const pl = latestPlayers[i];
          const wx = (pl.Position && pl.Position.X) || 0;
          const wy = (pl.Position && pl.Position.Y) || 0;
          const isSelf = (i === 0);
          const color = pl.Color || (isSelf ? '#3498db' : '#888888');
          const yaw = pl.YawDeg || 0;
          const s = worldToScreen(wx, wy);
          if (isSelf) {
            drawPlayerArrow(ctx, s.x, s.y, yaw, color, 10);
          } else {
            drawPlayerDot(ctx, s.x, s.y, color, 5);
          }
        }
      }

      function repositionPlayers() {
        redrawPlayerCanvas();
      }

      function renderPlayers(players) {
        latestPlayers = players || [];
        redrawPlayerCanvas();
      }

      function renderPings(pings) {
        const g = document.getElementById('g-pings');
        g.textContent = '';
        const inv = state.scale > 0 ? (1 / state.scale) : 1;
        const half = PING_HALF_PX * inv;
        const sw = PING_STROKE_PX * inv;
        for (const p of (pings || [])) {
          const loc = p.Location || {};
          const pos = worldToLocal(loc.X || 0, loc.Y || 0);
          const cross = el('g', { transform: `translate(${pos.x},${pos.y})` });
          cross.appendChild(el('line', { x1: -half, y1: -half, x2:  half, y2:  half, class: 'ping', 'stroke-width': sw }));
          cross.appendChild(el('line', { x1: -half, y1:  half, x2:  half, y2: -half, class: 'ping', 'stroke-width': sw }));
          const title = el('title');
          title.textContent = `${p.PingType || 'Ping'} • ${p.OwnerId || ''}`;
          cross.appendChild(title);
          g.appendChild(cross);
        }
      }

      function renderBoundsCoords() {
        const g = document.getElementById('g-coords');
        g.textContent = '';
        if (!bounds.hasData) return;
        const inv = state.scale > 0 ? (1 / state.scale) : 1;
        const inset = 6 * inv;
        const fs = 11 * inv;
        const w = (bounds.maxX - bounds.minX) * PX_PER_CM;
        const h = (bounds.maxY - bounds.minY) * PX_PER_CM;
        // North-up projection: screen-up = +X (North), screen-right = +Y (East).
        //   TL = NW = (maxX, minY), TR = NE = (maxX, maxY),
        //   BL = SW = (minX, minY), BR = SE = (minX, maxY).
        const corners = [
          { lx: inset,     ly: inset + fs,  anchor: 'start', wx: bounds.maxX, wy: bounds.minY },
          { lx: w - inset, ly: inset + fs,  anchor: 'end',   wx: bounds.maxX, wy: bounds.maxY },
          { lx: inset,     ly: h - inset,   anchor: 'start', wx: bounds.minX, wy: bounds.minY },
          { lx: w - inset, ly: h - inset,   anchor: 'end',   wx: bounds.minX, wy: bounds.maxY },
        ];
        for (const c of corners) {
          const t = el('text', {
            x: c.lx, y: c.ly,
            'text-anchor': c.anchor,
            class: 'bound-coord',
            'font-size': fs,
          });
          t.textContent = `${Math.round(c.wx)}, ${Math.round(c.wy)}`;
          g.appendChild(t);
        }
      }

      // Ctrl+Click teleport-cheat flash. Spawns a short-lived SVG circle that
      // pulses and fades over 600ms, then removes itself.
      function flashTeleportMarker(lx, ly) {
        const g = document.getElementById('g-cheat-fx');
        if (!g) return;
        const inv = state.scale > 0 ? (1 / state.scale) : 1;
        const ring = el('circle', {
          cx: lx, cy: ly, r: 4 * inv,
          class: 'tp-flash',
          'stroke-width': 1 * inv,
        });
        g.appendChild(ring);
        setTimeout(() => { if (ring.parentNode) ring.parentNode.removeChild(ring); }, 700);
      }

      // Picker — find the topmost player/ping/icon within PICK_RADIUS_PX
      // screen pixels of (lx, ly). Priority: players > pings > icons.
      function pickAt(lx, ly) {
        if (!latestSnapshot || !bounds.hasData) return null;
        const inv = state.scale > 0 ? (1 / state.scale) : 1;
        const r = PICK_RADIUS_PX * inv;
        const r2 = r * r;
        const players = latestSnapshot.Players || [];
        for (const pl of players) {
          const p = worldToLocal((pl.Position && pl.Position.X) || 0,
                                 (pl.Position && pl.Position.Y) || 0);
          const dx = lx - p.x, dy = ly - p.y;
          if (dx * dx + dy * dy <= r2) return { type: 'player', entity: pl };
        }
        const pings = latestPings || [];
        for (const pg of pings) {
          const loc = pg.Location || {};
          const p = worldToLocal(loc.X || 0, loc.Y || 0);
          const dx = lx - p.x, dy = ly - p.y;
          if (dx * dx + dy * dy <= r2) return { type: 'ping', entity: pg };
        }
        const icons = latestSnapshot.Icons || [];
        for (const ic of icons) {
          const p = worldToLocal((ic.Position && ic.Position.X) || 0,
                                 (ic.Position && ic.Position.Y) || 0);
          const dx = lx - p.x, dy = ly - p.y;
          if (dx * dx + dy * dy <= r2) return { type: 'icon', entity: ic };
        }
        return null;
      }

      // Expand `[{Value, Count}, ...]` into a flat array of length
      // expectedLen. The bridge ships FRLEEntry as a struct so JSON arrives
      // in PascalCase. Stops early if the RLE runs out, pads with zeros so
      // out-of-range lookups are well-defined.
      function expandRLE(entries, expectedLen) {
        const out = new Array(expectedLen | 0).fill(0);
        if (!Array.isArray(entries)) return out;
        let i = 0;
        for (const e of entries) {
          const v = (e && e.Value) | 0;
          let n = (e && e.Count) | 0;
          if (n <= 0) continue;
          if (i + n > expectedLen) n = expectedLen - i;
          for (let k = 0; k < n; k++) out[i + k] = v;
          i += n;
          if (i >= expectedLen) break;
        }
        return out;
      }

      function onTileGrid(p) {
        if (!p || !p.WorldSize || p.WorldSize <= 0) { tileGrid = null; return; }
        const total = (p.WorldSize | 0) * (p.WorldSize | 0);
        tileGrid = {
          worldSize: p.WorldSize | 0,
          tileSize: p.TileSizeUnits || 0,
          // C++ matches Snapshot.MinBounds = (0, 0), Snapshot.MaxBounds = (FullW, FullW).
          // We re-derive instead of trusting the snapshot in case TileGrid arrives first.
          minX: (p.MinBounds && p.MinBounds.X) || 0,
          minY: (p.MinBounds && p.MinBounds.Y) || 0,
          maxX: (p.MaxBounds && p.MaxBounds.X) || 0,
          maxY: (p.MaxBounds && p.MaxBounds.Y) || 0,
          palette: Array.isArray(p.BiomePalette) ? p.BiomePalette : [],
          biomes:  expandRLE(p.BiomeRLE,  total),
          heights: expandRLE(p.HeightRLE, total),
        };
      }

      // Convert a world coordinate to a tile lookup result.
      // worldgen tile index = North * WorldSize + East, where
      //   North = floor(world.X / TileSize),  East = floor(world.Y / TileSize).
      // Returns null for positions outside the grid.
      function tileAt(wx, wy) {
        if (!tileGrid || tileGrid.tileSize <= 0 || tileGrid.worldSize <= 0) return null;
        const N = Math.floor(wx / tileGrid.tileSize);
        const E = Math.floor(wy / tileGrid.tileSize);
        if (N < 0 || E < 0 || N >= tileGrid.worldSize || E >= tileGrid.worldSize) return null;
        const idx = N * tileGrid.worldSize + E;
        const paletteIdx = tileGrid.biomes[idx] | 0;
        const biomeName = (paletteIdx >= 0 && paletteIdx < tileGrid.palette.length)
          ? tileGrid.palette[paletteIdx]
          : '';
        return {
          index: idx,
          north: N,
          east: E,
          biome: biomeName,
          height: tileGrid.heights[idx] | 0,
        };
      }

      // Split a PascalCase / camelCase name into space-separated words so a tag
      // like "ShowFloor" reads "Show Floor" when the BiomeDefinition.DisplayName
      // field is empty. Leaves names that already contain a space alone.
      function humanizeBiome(name) {
        if (!name || /\s/.test(name)) return name || '';
        return name
          .replace(/([a-z0-9])([A-Z])/g, '$1 $2')
          .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2');
      }

      function describeTile(wx, wy) {
        const t = tileAt(wx, wy);
        if (!t) return null;
        // Three lines (relies on #hover-chip's `white-space: pre`):
        //   biome
        //   Floor N
        //   (X, Y)
        const lines = [];
        const biome = humanizeBiome(t.biome);
        if (biome) lines.push(biome);
        lines.push('Floor ' + t.height);
        lines.push('(' + Math.round(wx) + ', ' + Math.round(wy) + ')');
        return lines.join('\n');
      }

      function describePick(pick) {
        if (!pick) return null;
        const e = pick.entity;
        if (pick.type === 'player') {
          const x = Math.round((e.Position && e.Position.X) || 0);
          const y = Math.round((e.Position && e.Position.Y) || 0);
          return `${e.Name || e.PlayerId || 'Player'} • (${x}, ${y})`;
        }
        if (pick.type === 'ping') {
          const loc = e.Location || {};
          const x = Math.round(loc.X || 0);
          const y = Math.round(loc.Y || 0);
          return [e.PingType || 'Ping', e.OwnerId, `(${x}, ${y})`].filter(Boolean).join(' • ');
        }
        const x = Math.round((e.Position && e.Position.X) || 0);
        const y = Math.round((e.Position && e.Position.Y) || 0);
        return [e.Label, e.Category, `(${x}, ${y})`].filter(Boolean).join(' • ');
      }

      function hideHoverChip() {
        const chip = document.getElementById('hover-chip');
        if (chip) chip.style.display = 'none';
        setPoiHover(false);
      }

      // Mirrors "the mouse is over a pickable POI" onto the viewport so the
      // custom cursor (shared/cursor.js) switches to its locked-on look. POIs
      // are hit-tested in code, so the cursor can't see them via DOM hover.
      function setPoiHover(on) {
        const vp = document.getElementById('map-viewport');
        if (!vp) return;
        const want = !!on && !state.isPad;
        if (vp.hasAttribute('data-cursor-poi') === want) return;
        vp.toggleAttribute('data-cursor-poi', want);
        if (window.TSICCursor) window.TSICCursor.refresh();
      }

      // The fog overlay is visible unless the SetFogOfWarVisible cheat hid it.
      // When it's hidden (or fog is disabled), don't suppress hover.
      function fowOverlayVisible() {
        const img = document.getElementById('fow-tex');
        return !!img && img.style.display !== 'none';
      }

      function updateHoverChip() {
        const chip = document.getElementById('hover-chip');
        const vp = document.getElementById('map-viewport');
        if (!chip || !vp || !bounds.hasData) { hideHoverChip(); return; }
        let cx, cy;
        if (state.isPad) {
          // Gamepad crosshair sits at viewport center.
          cx = vp.clientWidth  / 2;
          cy = vp.clientHeight / 2;
        } else {
          if (state.mouseX < 0) { hideHoverChip(); return; }
          cx = state.mouseX;
          cy = state.mouseY;
        }
        const lx = (cx - state.panX) / state.scale;
        const ly = (cy - state.panY) / state.scale;
        const { wx, wy } = localToWorld(lx, ly);
        // Hide everything (tile info + POI/player/ping labels) over unexplored fog.
        const TF = window.TSICFow;
        if (fowGrid && TF && fowOverlayVisible() && !TF.exploredAt(fowGrid, wx, wy)) {
          hideHoverChip();
          return;
        }
        // Prefer entity hover (player/ping/icon); fall back to tile info so the
        // chip is informative whenever the cursor is over the map texture.
        const pick = pickAt(lx, ly);
        setPoiHover(!!pick);
        let text = describePick(pick);
        if (!text) {
          text = describeTile(wx, wy);
        }
        if (!text) { hideHoverChip(); return; }
        chip.textContent = text;
        chip.style.display = 'block';
        // Anchor: just below-right of cursor / crosshair; flip if it would
        // run off the right or bottom edge of the viewport.
        const offset = state.isPad ? 18 : 12;
        let px = cx + offset, py = cy + offset;
        const w = chip.offsetWidth;
        const h = chip.offsetHeight;
        if (px + w > vp.clientWidth)  px = Math.max(0, cx - offset - w);
        if (py + h > vp.clientHeight) py = Math.max(0, cy - offset - h);
        chip.style.left = px + 'px';
        chip.style.top  = py + 'px';
      }

      function rerender() {
        const p = latestSnapshot;
        const empty = document.getElementById('empty');
        // Early-return paths must clear the SVG groups, otherwise stale
        // renders from the previous snapshot stay visible underneath the
        // "Waiting…" / "Unavailable" banner (caught by the playground when
        // swapping into the "No snapshot" scenario).
        if (!p) {
          document.getElementById('g-icons').textContent = '';
          document.getElementById('g-pings').textContent = '';
          document.getElementById('g-coords').textContent = '';
          renderPlayers([]);
          hideHoverChip();
          empty.textContent = 'Waiting for map data…';
          empty.style.display = '';
          return;
        }
        if (!bounds.hasData) {
          document.getElementById('g-icons').textContent = '';
          document.getElementById('g-pings').textContent = '';
          document.getElementById('g-coords').textContent = '';
          renderPlayers([]);
          hideHoverChip();
          empty.textContent = 'Map bounds unavailable.';
          empty.style.display = '';
          return;
        }
        const hasAny = ((p.Icons || []).length + (p.Players || []).length) > 0;
        if (!hasAny) {
          empty.textContent = 'No map data.';
          empty.style.display = '';
        } else {
          empty.style.display = 'none';
        }
        renderIcons(p.Icons);
        renderPlayers(p.Players);
        renderPings(latestPings);
        renderBoundsCoords();
        updateHoverChip();
      }

      function onSnapshot(p) {
        latestSnapshot = p;
        if (p) setBounds(p.MinBounds, p.MaxBounds);
        rerender();
      }

      function onPingSet(p) {
        latestPings = (p && p.Pings) || [];
        if (latestSnapshot) renderPings(latestPings);
      }

      let dragging = false;
      let dragLastX = 0, dragLastY = 0;

      function onMouseDown(ev) {
        if (ev.button !== 0) return;
        if (ev.ctrlKey && !ev.shiftKey && !ev.altKey) {
          // Ctrl+LMB = debug-cheat teleport. Convert click to world coords,
          // clamp to world bounds, ship as a console command via the existing
          // UI.Cmd.Cheat.Execute channel. No-op if bounds aren't loaded yet.
          const vp = document.getElementById('map-viewport');
          const rect = vp.getBoundingClientRect();
          const lx = (ev.clientX - rect.left - state.panX) / state.scale;
          const ly = (ev.clientY - rect.top  - state.panY) / state.scale;
          if (!bounds.hasData) return;
          const { wx, wy } = localToWorld(lx, ly);
          const X = Math.max(bounds.minX, Math.min(bounds.maxX, wx));
          const Y = Math.max(bounds.minY, Math.min(bounds.maxY, wy));
          tsic.publishMessage('UI.Cmd.Cheat.Execute', {
            Command: `Teleport2D ${X.toFixed(0)} ${Y.toFixed(0)}`,
          });
          flashTeleportMarker(lx, ly);
          ev.preventDefault();
          ev.stopPropagation();
          return;
        }
        dragging = true;
        dragLastX = ev.clientX;
        dragLastY = ev.clientY;
        document.getElementById('map-viewport').classList.add('dragging');
      }
      function onMouseMove(ev) {
        if (!dragging) return;
        state.panX += (ev.clientX - dragLastX);
        state.panY += (ev.clientY - dragLastY);
        dragLastX = ev.clientX;
        dragLastY = ev.clientY;
        applyTransform();
        repositionPlayers();
        updateHoverChip();
      }
      function onMouseUp() {
        dragging = false;
        document.getElementById('map-viewport').classList.remove('dragging');
      }
      function onWheel(ev) {
        ev.preventDefault();
        const vp = document.getElementById('map-viewport');
        const rect = vp.getBoundingClientRect();
        const cx = ev.clientX - rect.left;
        const cy = ev.clientY - rect.top;
        const factor = ev.deltaY < 0 ? 1.1 : (1 / 1.1);
        const lx = (cx - state.panX) / state.scale;
        const ly = (cy - state.panY) / state.scale;
        state.scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, state.scale * factor));
        state.panX = cx - lx * state.scale;
        state.panY = cy - ly * state.scale;
        applyTransform();
        // Counter-scaled icon/player/ping geometry depends on state.scale,
        // so re-render after every zoom change.
        rerender();
      }

      function onContextMenu(ev) {
        ev.preventDefault();
        const vp = document.getElementById('map-viewport');
        const rect = vp.getBoundingClientRect();
        const cx = ev.clientX - rect.left;
        const cy = ev.clientY - rect.top;
        const lx = (cx - state.panX) / state.scale;
        const ly = (cy - state.panY) / state.scale;
        if (!bounds.hasData) return;
        const { wx, wy } = localToWorld(lx, ly);
        const clampedX = Math.max(bounds.minX, Math.min(bounds.maxX, wx));
        const clampedY = Math.max(bounds.minY, Math.min(bounds.maxY, wy));
        tsic.publishMessage('UI.Cmd.Ping.Request', {
          PingType: 'Map',
          Location: { X: clampedX, Y: clampedY, Z: 0 },
        });
      }

      function onKey(ev) {
        if (ev.key === 'Escape') {
          tsic.publishMessage('UI.Cmd.GameScreen.Close', {});
        } else if (ev.key === 'r' || ev.key === 'R') {
          fitToBounds();
        }
      }

      {
        const vp = document.getElementById('map-viewport');
        vp.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup',   onMouseUp);
        vp.addEventListener('wheel', onWheel, { passive: false });
        vp.addEventListener('contextmenu', onContextMenu);
        window.addEventListener('keydown', onKey);
        window.addEventListener('resize', fitToBounds);

        // Enhanced-Input bridge subscriptions. Action names below match
        // UInputAction assets in IMC_Map; if those assets are renamed, update
        // the channel names here to match.
        function zoomBy(direction, dt) {
          const factor = direction > 0 ? Math.pow(1.5, dt) : Math.pow(1 / 1.5, dt);
          // Pivot zoom around the viewport center for gamepad/keyboard zoom.
          const vp = document.getElementById('map-viewport');
          const rect = vp.getBoundingClientRect();
          const cx = rect.width / 2;
          const cy = rect.height / 2;
          const lx = (cx - state.panX) / state.scale;
          const ly = (cy - state.panY) / state.scale;
          state.scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, state.scale * factor));
          state.panX = cx - lx * state.scale;
          state.panY = cy - ly * state.scale;
          applyTransform();
          rerender();
        }
        function centerOnLocalPlayer() {
          if (!latestSnapshot || !bounds.hasData) return;
          const me = (latestSnapshot.Players || [])[0];
          if (!me || !me.Position) return;
          const loc = worldToLocal(me.Position.X || 0, me.Position.Y || 0);
          const vp = document.getElementById('map-viewport');
          state.panX = vp.clientWidth  / 2 - loc.x * state.scale;
          state.panY = vp.clientHeight / 2 - loc.y * state.scale;
          applyTransform();
          rerender();
        }
        function placePingAtCursorOrCenter() {
          if (!bounds.hasData) return;
          const vp = document.getElementById('map-viewport');
          const rect = vp.getBoundingClientRect();
          const cx = rect.width / 2;
          const cy = rect.height / 2;
          const lx = (cx - state.panX) / state.scale;
          const ly = (cy - state.panY) / state.scale;
          const { wx, wy } = localToWorld(lx, ly);
          const X = Math.max(bounds.minX, Math.min(bounds.maxX, wx));
          const Y = Math.max(bounds.minY, Math.min(bounds.maxY, wy));
          tsic.publishMessage('UI.Cmd.Ping.Request', {
            PingType: 'Map', Location: { X: X, Y: Y, Z: 0 },
          });
        }
        function panBy(dx, dy) {
          state.panX += dx;
          state.panY += dy;
          applyTransform();
          repositionPlayers();
          updateHoverChip();
        }
        const GAMEPAD_PAN_PX_PER_SEC = 800;
        tsic.on('tsic.msg.UI.Input.IA_UI_MapZoomIn',  (e) => { if (e.Phase === 'Triggered') zoomBy(+1, e.ElapsedSec); });
        tsic.on('tsic.msg.UI.Input.IA_UI_MapZoomOut', (e) => { if (e.Phase === 'Triggered') zoomBy(-1, e.ElapsedSec); });
        tsic.on('tsic.msg.UI.Input.IA_UI_MapCenterOnPlayer', (e) => { if (e.Phase === 'Started') centerOnLocalPlayer(); });
        tsic.on('tsic.msg.UI.Input.IA_UI_MapPlacePing',      (e) => { if (e.Phase === 'Started') placePingAtCursorOrCenter(); });
        // Stick-pan: IA_UI_MapMove is an Axis2D action; X/Y are the stick deltas.
        // Translate to pan deltas in screen pixels per second.
        tsic.on('tsic.msg.UI.Input.IA_UI_MapMove', (e) => {
          if (e.Phase !== 'Triggered') return;
          const dt = e.ElapsedSec || (1 / 60);
          // Stick positive Y points up in UE convention; invert for screen Y-down.
          panBy(-e.Value.X * GAMEPAD_PAN_PX_PER_SEC * dt,
                 e.Value.Y * GAMEPAD_PAN_PX_PER_SEC * dt);
        });
        tsic.on('tsic.msg.UI.Map.Snapshot', onSnapshot);
        tsic.on('tsic.msg.UI.Map.TileGrid', onTileGrid);
        tsic.on('tsic.msg.UI.Ping.Set', onPingSet);

        tsic.on('tsic.msg.UI.Map.Fow', function() {
          var img = document.getElementById('fow-tex');
          if (img) img.src = TSIC.runtimeImgUrl('fow') + '?t=' + Date.now();
        });

        tsic.on('tsic.msg.UI.Map.FowGrid', function(p) {
          fowGrid = window.TSICFow ? window.TSICFow.build(p) : null;
          updateHoverChip();
        });

        // SetFogOfWarVisible cheat — toggles the map-screen FOW overlay locally.
        tsic.on('tsic.msg.Cheats.Map.Fow.Visibility', function(p) {
          var img = document.getElementById('fow-tex');
          if (!img) return;
          img.style.display = (p && p.bVisible === false) ? 'none' : '';
        });

        // Debug-overlay toggle (driven by WebUI.Map.DebugHeight /
        // WebUI.Map.DebugMazeRegions console commands). Sticky channel:
        // a freshly-opened map screen replays the last toggled state.
        // Payload: { Layer: 'height'|'maze'|'all', Visible: bool }.
        // We re-set the <img> src on show so the browser refetches the
        // runtime texture — it's only registered after the first toggle,
        // so the initial fetch on page-load resolves empty.
        tsic.on('tsic.debug.Map.Overlay', (p) => {
          if (!p || !p.Layer) return;
          const id = p.Layer === 'height' ? 'debug-height-tex'
                   : p.Layer === 'maze'   ? 'debug-maze-tex'
                   : p.Layer === 'all'    ? 'debug-all-tex'
                   : null;
          if (!id) return;
          const img = document.getElementById(id);
          if (!img) return;
          if (p.Visible) {
            var base = id === 'debug-height-tex' ? TSIC.runtimeImgUrl('world-debug-height')
                     : id === 'debug-maze-tex'   ? TSIC.runtimeImgUrl('world-debug-maze')
                     : id === 'debug-all-tex'    ? TSIC.runtimeImgUrl('world-debug-all')
                     : null;
            if (!base) return;
            img.src = base + '?t=' + Date.now();
            img.style.display = 'block';
          } else {
            img.style.display = 'none';
          }
        });
        // Gamepad crosshair: toggle a class on the viewport when the active
        // input device is the gamepad. The cursor sits at the viewport
        // center and acts as the snap-to anchor for IA_UI_MapPlacePing.
        tsic.on('tsic.msg.UI.Input.Mode.Changed', (p) => {
          const isPad = !!(p && (p.Device === 'gamepad' || p.Mode === 'Gamepad'));
          state.isPad = isPad;
          vp.classList.toggle('pad-cursor', isPad);
          // Re-anchor the hover chip to the new picker (crosshair vs cursor).
          updateHoverChip();
        });

        // Cheat-availability gate — UI.Cheat.Catalog is broadcast once on session
        // start, only when the cheat manager is enabled (see ScpUIDirectorSubsystem
        // line 719). First receipt is sufficient to surface the Ctrl+Click hint.
        let cheatEnabled = false;
        function updateHint() {
          const h = document.getElementById('hint');
          if (!h) return;
          const base = h.getAttribute('data-base') || h.textContent;
          h.textContent = cheatEnabled
            ? base + ' · Ctrl+Click = teleport (cheats)'
            : base;
        }
        tsic.on('tsic.msg.UI.Cheat.Catalog', () => {
          cheatEnabled = true;
          updateHint();
        });

        // Track mouse position over the viewport for the hover picker. Note
        // the drag-pan listener at window level still updates state.panX/Y;
        // this listener only feeds state.mouseX/Y for picking.
        vp.addEventListener('mousemove', (ev) => {
          const rect = vp.getBoundingClientRect();
          state.mouseX = ev.clientX - rect.left;
          state.mouseY = ev.clientY - rect.top;
          updateHoverChip();
        });
        vp.addEventListener('mouseleave', () => {
          state.mouseX = -1;
          state.mouseY = -1;
          if (!state.isPad) hideHoverChip();
        });
      }
    })();
  </script>
</body></html>
