<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="tsic-screen" content="MainMenu">
  <!-- Activates the generic UI menu input situation so UI.Behavior.* events
       (arrow nav, Accept, Back) fire here. Without it NO situation is active
       on the title screen and neither keyboard nor D-pad nav produce events.
       cancel-cmd is blank: this is the front-end root, Esc has nowhere to go. -->
  <meta name="tsic-input-mode" content="InputMode.Menu.MainMenu">
  <meta name="tsic-cancel-cmd" content="">
  <meta name="tsic-focus" content="enabled">
  <title>TSIC — Main Menu</title>
  <link rel="stylesheet" href="/shared/base.css">
  <link rel="stylesheet" href="/shared/components.css">
  <script src="/shared/router.js" defer></script>
  <script src="/shared/tsic-bridge.js" defer></script>
  <script src="/shared/tsic-runtime.js" defer></script>
  <script src="/shared/tsic-focus.js" defer></script>
  <script src="/shared/tsic-dropdown.js" defer></script>
  <script src="/shared/store-maze.js" defer></script>
  <script src="/shared/store-maze-stage.js" defer></script>
  <style>

    /* Showroom feature tile — magazine "photo" of the showroom. Halftone
       background with an inline-SVG furniture silhouette. A random showroom
       template is cloned into .menu-feature-photo at boot. */
    .menu-feature {
      position: relative;
      margin: 0;
      background: var(--paper-bright);
      border-top: 4px solid var(--ink-night);
      border-bottom: 4px solid var(--ink-night);
      overflow: hidden;
    }
    .menu-feature-photo {
      position: relative;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--paper-muted);
      background-image:
        radial-gradient(rgba(10, 10, 10, 0.55) 14%, transparent 15%),
        radial-gradient(rgba(10, 10, 10, 0.55) 14%, transparent 15%);
      background-size: 8px 8px, 8px 8px;
      background-position: 0 0, 4px 4px;
    }
    .menu-feature-photo svg {
      display: block;
      width: 280px;
      height: 180px;
      color: var(--ink-night);
    }
    .menu-feature-cap {
      position: absolute;
      top: 8px; left: 8px;
      z-index: 1;
      background: var(--ink-night);
      color: var(--paper-bright);
      padding: 3px 8px;
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ────── Shared showroom animations ──────
     * Generic class names so any showroom template can reuse them. Room-
     * specific motion (armchair breathing, oven glow, steam) lives below. */

    @keyframes showroom-bulb-pulse {
      0%, 100% { opacity: 0.85; transform: scale(0.95); }
      50%      { opacity: 1;    transform: scale(1.08); }
    }
    .showroom-bulb { animation: showroom-bulb-pulse 4s ease-in-out infinite; }

    @keyframes showroom-beam-flicker {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.75; }
    }
    .showroom-beam { animation: showroom-beam-flicker 4s ease-in-out infinite; }

    @keyframes showroom-mote-drift {
      0%   { transform: translate(0, 0);                            opacity: 0; }
      20%  { opacity: 0.7; }
      80%  { opacity: 0.7; }
      100% { transform: translate(var(--drift-x, -10px), -40px);    opacity: 0; }
    }
    .showroom-mote {
      fill: var(--lamp-light, #fff8b8);
      opacity: 0;
      animation: showroom-mote-drift var(--duration, 5s) ease-in-out infinite var(--delay, 0s);
    }

    @keyframes showroom-shadow-pulse {
      0%, 100% { opacity: 0.08; }
      50%      { opacity: 0.14; }
    }
    .showroom-shadow {
      fill: currentColor;
      animation: showroom-shadow-pulse 4s ease-in-out infinite;
    }

    /* ────── Living-room-specific ────── */
    @keyframes showroom-breathe {
      0%, 100% { transform: scale(1, 1); }
      50%      { transform: scale(1.003, 0.995); }
    }
    .showroom-armchair {
      transform-origin: 130px 160px;
      animation: showroom-breathe 6s ease-in-out infinite;
    }

    /* ────── Kitchen-specific ────── */
    @keyframes showroom-oven-pulse {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }
    .showroom-oven { animation: showroom-oven-pulse 5s ease-in-out infinite; }

    @keyframes showroom-steam-rise {
      0%   { transform: translateY(0)     scaleX(0.9); opacity: 0; }
      30%  { opacity: 0.7; }
      70%  { opacity: 0.5; }
      100% { transform: translateY(-15px) scaleX(1.3); opacity: 0; }
    }
    .showroom-steam {
      animation: showroom-steam-rise var(--duration, 4s) ease-in-out infinite var(--delay, 0s);
      transform-origin: 138px 75px;
    }

    /* ────── Bedroom-specific ────── */
    @keyframes showroom-cat-breathe {
      0%, 100% { transform: scale(1, 1); }
      50%      { transform: scale(0.98, 1.04); }
    }
    .showroom-cat {
      transform-origin: 205px 123px;
      animation: showroom-cat-breathe 3.5s ease-in-out infinite;
    }

    @keyframes showroom-twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
    .showroom-star {
      fill: var(--paper-muted);
      animation: showroom-twinkle var(--duration, 4s) ease-in-out infinite var(--delay, 0s);
    }

    /* ────── Kids-room-specific ────── */
    @keyframes showroom-fairy-twinkle {
      0%, 100% { opacity: 0.4; fill: var(--paper-muted); }
      50%      { opacity: 1;   fill: var(--lamp-light, #fff8b8); }
    }
    .showroom-fairy-light {
      animation: showroom-fairy-twinkle 3s ease-in-out infinite var(--delay, 0s);
    }

    @keyframes showroom-rock {
      0%, 100% { transform: rotate(-2.5deg); }
      50%      { transform: rotate( 2.5deg); }
    }
    .showroom-rocking-horse {
      transform-origin: 210px 160px;
      animation: showroom-rock 3.5s ease-in-out infinite;
    }

    /* ────── Hallway-specific (flickering lamp + pendulum + twitch) ──────
     * The spooky-flicker animation is shared between the bulb and the beam
     * so they flicker in sync — like a single failing bulb. The bulb gets
     * an inline transform-origin so the scale-blip stays anchored. */
    @keyframes showroom-spooky-flicker {
      0%, 21%, 25%, 51%, 55%, 81%, 85%, 100% { opacity: 0.85; transform: scale(1);    }
      22%, 24%                                { opacity: 0.30; transform: scale(0.97); }
      23%                                     { opacity: 0.10; transform: scale(0.95); }
      52%, 54%                                { opacity: 0.20; transform: scale(0.96); }
      53%                                     { opacity: 0.80; transform: scale(1);    }
      82%, 84%                                { opacity: 0.40; transform: scale(0.98); }
      83%                                     { opacity: 0.10; transform: scale(0.92); }
    }
    .showroom-spooky-bulb { animation: showroom-spooky-flicker 7s infinite; }
    .showroom-spooky-beam { animation: showroom-spooky-flicker 7s infinite; }

    @keyframes showroom-pendulum-swing {
      0%, 100% { transform: rotate( 7deg); }
      50%      { transform: rotate(-7deg); }
    }
    .showroom-pendulum {
      transform-origin: 38px 65px;
      animation: showroom-pendulum-swing 2s ease-in-out infinite;
    }

    @keyframes showroom-head-twitch {
      0%, 78%, 85%, 100% { transform: rotate(  0deg); }
      79%                { transform: rotate( 15deg); }
      80%                { transform: rotate( -8deg); }
      81%                { transform: rotate(  5deg); }
      82%                { transform: rotate( -2deg); }
    }
    .showroom-creepy-head {
      transform-origin: 115px 55px;
      animation: showroom-head-twitch 8s infinite;
    }

    @keyframes showroom-eyes-dart {
      0%,  15%  { transform: translate(0, 0); }
      18%, 35%  { transform: translate(-2px, 0.5px); }
      38%, 55%  { transform: translate( 1.5px, -0.5px); }
      58%, 75%  { transform: translate( 2px, 0); }
      78%, 95%  { transform: translate(-1px, 0.5px); }
      100%      { transform: translate(0, 0); }
    }
    .showroom-eyes { animation: showroom-eyes-dart 5s infinite; }
  </style>
</head><body>

  <div class="tsic-stage--magazine-gradient">
    <div class="tsic-panel tsic-cover">

      <!-- MASTHEAD -->
      <div class="tsic-masthead">
        <div class="tsic-masthead-title">
          <em>The Store is</em>
          Closed.
        </div>
        <div class="tsic-masthead-meta">
          <span class="tsic-masthead-issue">Vol.1 — The Store Opens</span>
          <span class="tsic-masthead-date" id="kicker-slot">RESTOCK PENDING · DEC 1983</span>
        </div>
      </div>

      <script>
        // Kicker text — randomized on each load via tsic.kicker(). The
        // suffix " · DEC 1983" is appended automatically; entries below
        // are just the rotating prefix. Add, remove, or reorder freely.
        //
        // Boot guard: this inline script runs during HTML parse, BEFORE the
        // deferred tsic-*.js load, so `tsic` isn't defined yet — wait for it.
        (function bootKicker() {
          if (!window.tsic || typeof tsic.whenReady !== 'function') { setTimeout(bootKicker, 16); return; }
          tsic.whenReady(() => tsic.kicker('kicker-slot', [
            // — opening day / debut —
            'PREVIEW ISSUE', 'OPENING DAY', 'GRAND OPENING', 'DEBUT EDITION',
            'INAUGURAL ISSUE', 'CHARTER ISSUE', 'FIRST PRESSING',
            'FRESH OFF THE PRESS', 'RIBBON CUTTING', 'SOFT OPENING',
            // — retail flavor —
            'NOW HIRING', 'ALL DEPARTMENTS OPEN', 'FREE WITH PURCHASE',
            'WHILE SUPPLIES LAST', 'AS SEEN ON TV', "COLLECTOR'S EDITION",
            // — slightly off —
            'DOORS OPEN SOON', 'STOCK ARRIVING', 'MIND THE FLOORS',
            'WATCH YOUR STEP', 'FOR DISPLAY ONLY', 'RESTOCK PENDING',
            // — past closing —
            'AFTER HOURS', 'NO REFUNDS', 'FINAL SALE', 'CHECK BEHIND YOU',
            'AISLE 13 SEALED', 'THE STORE REMEMBERS',
          ], ' · DEC 1983'));
        })();
      </script>

      <!-- FEATURE SPREAD — random showroom cloned into #showroom-slot at boot -->
      <div class="menu-feature">
        <span class="menu-feature-cap" id="showroom-cap">Showroom · Featured</span>
        <div class="menu-feature-photo" id="showroom-slot">
          <!-- SVG injected from a <template> below -->
        </div>
      </div>

      <!-- MENU ROWS -->
      <div class="tsic-cover-rows" data-tsic-focus-group="nav">
        <button class="tsic-row-button" id="btn-start" data-tsic-initial-focus>
          <span class="tsic-row-dept">Dept. 04</span>
          New Game
          <span class="tsic-row-pg">PG. 04</span>
        </button>
        <button class="tsic-row-button" id="btn-load">
          <span class="tsic-row-dept">Dept. 12</span>
          Load Save
          <span class="tsic-row-pg">PG. 12</span>
        </button>
        <button class="tsic-row-button" id="btn-mods">
          <span class="tsic-row-dept">Dept. 33</span>
          Mods
          <span class="tsic-row-pg">PG. 33</span>
        </button>
        <button class="tsic-row-button" id="btn-settings">
          <span class="tsic-row-dept">Dept. 88</span>
          Settings
          <span class="tsic-row-pg">PG. 88</span>
        </button>
        <button class="tsic-row-button" id="btn-credits">
          <span class="tsic-row-dept">Dept. 99</span>
          Credits
          <span class="tsic-row-pg">PG. 99</span>
        </button>
        <button class="tsic-row-button" id="btn-exit">
          <span class="tsic-row-dept">Fire Exit</span>
          Leave the Store
          <span class="tsic-row-pg">END</span>
        </button>
        <!-- Dev/testing only: revealed by the UI.State.DevMode flag in non-shipping builds. -->
        <button class="tsic-row-button" id="btn-dev-join" style="display:none">
          <span class="tsic-row-dept">Dev</span>
          Join Game (Dev)
          <span class="tsic-row-pg">DEV</span>
        </button>
      </div>
    </div>
  </div>

  <!--
    ═══════════════════════════════════════════════════════════════════
    SHOWROOM TEMPLATES
    Each <template data-showroom data-cap="..."> contributes one room to the
    random pool. The picker script below clones a random one into
    #showroom-slot and sets the caption. Add a new template to add a room.
    All animation classes are prefixed `showroom-` so any new SVG can reuse
    them; room-specific motion has its own class in the CSS block above.
    ═══════════════════════════════════════════════════════════════════
  -->

  <!-- ─── Showroom A · Living Room ─── -->
  <template data-showroom data-id="living-room" data-cap="Showroom A · Living Room">
    <svg viewBox="0 0 280 180" aria-hidden="true" style="--lamp-light:#fff8b8;">
      <defs>
        <linearGradient id="showroom-beam-gradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#fff8b8" stop-opacity="0.8" />
          <stop offset="100%" stop-color="#fff8b8" stop-opacity="0" />
        </linearGradient>
        <filter id="showroom-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- ambient shadows -->
      <ellipse cx="38"  cy="160" rx="22" ry="3" class="showroom-shadow" />
      <ellipse cx="130" cy="160" rx="60" ry="4" class="showroom-shadow" style="animation-delay: -1s;" />
      <ellipse cx="235" cy="160" rx="30" ry="3" class="showroom-shadow" style="animation-delay: -2s;" />

      <rect x="0" y="160" width="280" height="2" fill="currentColor" />

      <g class="showroom-armchair">
        <rect x="80" y="50" width="100" height="70" rx="6" fill="currentColor" />
        <rect x="64" y="80" width="22" height="60" rx="4" fill="currentColor" />
        <rect x="174" y="80" width="22" height="60" rx="4" fill="currentColor" />
        <rect x="76" y="100" width="108" height="34" rx="4" fill="currentColor" />
        <rect x="70" y="138" width="10" height="22" fill="currentColor" />
        <rect x="180" y="138" width="10" height="22" fill="currentColor" />
        <rect x="100" y="62" width="2" height="48" fill="var(--paper-muted)" />
        <rect x="138" y="62" width="2" height="48" fill="var(--paper-muted)" />
        <rect x="158" y="62" width="2" height="48" fill="var(--paper-muted)" />
      </g>

      <!-- side table -->
      <rect x="18" y="110" width="40" height="6" fill="currentColor" />
      <rect x="22" y="116" width="6" height="44" fill="currentColor" />
      <rect x="48" y="116" width="6" height="44" fill="currentColor" />

      <!-- lamp stand + shade -->
      <rect x="34" y="86" width="10" height="24" fill="currentColor" />
      <rect x="38" y="60" width="2" height="26" fill="currentColor" />
      <polygon points="28,60 50,60 56,38 22,38" fill="currentColor" />

      <polygon points="28,60 50,60 70,160 5,160" fill="url(#showroom-beam-gradient)" class="showroom-beam" />
      <circle cx="39" cy="50" r="6" fill="#fff8b8" filter="url(#showroom-glow)" class="showroom-bulb" style="transform-origin: 39px 50px;" />

      <circle cx="42" cy="140" r="1.5" class="showroom-mote" style="--duration: 6s;   --delay: 0s;   --drift-x: -8px;" />
      <circle cx="28" cy="115" r="1"   class="showroom-mote" style="--duration: 5s;   --delay: 2s;   --drift-x: 12px;" />
      <circle cx="50" cy="90"  r="1.2" class="showroom-mote" style="--duration: 7s;   --delay: 3s;   --drift-x: -15px;" />
      <circle cx="32" cy="150" r="0.8" class="showroom-mote" style="--duration: 4.5s; --delay: 1.5s; --drift-x: 5px;" />

      <!-- footstool -->
      <rect x="210" y="130" width="50" height="14" fill="currentColor" />
      <rect x="214" y="144" width="6" height="16" fill="currentColor" />
      <rect x="250" y="144" width="6" height="16" fill="currentColor" />
    </svg>
  </template>

  <!-- ─── Showroom B · Kitchen ─── -->
  <template data-showroom data-id="kitchen" data-cap="Showroom B · Kitchen">
    <svg viewBox="0 0 280 180" aria-hidden="true" style="--lamp-light:#fff8b8;">
      <defs>
        <linearGradient id="showroom-beam-gradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#fff8b8" stop-opacity="0.8" />
          <stop offset="100%" stop-color="#fff8b8" stop-opacity="0" />
        </linearGradient>
        <filter id="showroom-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- ambient shadows -->
      <ellipse cx="33"  cy="160" rx="25" ry="3" class="showroom-shadow" />
      <ellipse cx="125" cy="160" rx="70" ry="4" class="showroom-shadow" style="animation-delay: -1s;" />
      <ellipse cx="206" cy="160" rx="15" ry="2" class="showroom-shadow" style="animation-delay: -2s;" />

      <rect x="0" y="160" width="280" height="2" fill="currentColor" />

      <!-- backsplash tile lines -->
      <line x1="56" y1="88" x2="210" y2="88" stroke="var(--paper-muted)" stroke-width="1" />
      <line x1="56" y1="80" x2="140" y2="80" stroke="var(--paper-muted)" stroke-width="1" />

      <!-- tall fridge -->
      <rect x="10" y="50" width="46" height="110" rx="4" fill="currentColor" />
      <rect x="10" y="100" width="46" height="2" fill="var(--paper-muted)" />
      <rect x="46" y="70"  width="3" height="20" rx="1.5" fill="var(--paper-bright)" />
      <rect x="46" y="106" width="3" height="25" rx="1.5" fill="var(--paper-bright)" />

      <!-- counter + base cabinets -->
      <rect x="58" y="100" width="132" height="60" fill="currentColor" />
      <rect x="56" y="96"  width="154" height="4" rx="1" fill="currentColor" />
      <rect x="70"  y="100" width="2" height="60" fill="var(--paper-muted)" />
      <rect x="108" y="100" width="2" height="60" fill="var(--paper-muted)" />
      <rect x="140" y="100" width="2" height="60" fill="var(--paper-muted)" />
      <rect x="188" y="100" width="2" height="60" fill="var(--paper-muted)" />

      <!-- oven knobs + handle -->
      <circle cx="78" cy="103" r="1.5" fill="var(--paper-bright)" />
      <circle cx="85" cy="103" r="1.5" fill="var(--paper-bright)" />
      <circle cx="92" cy="103" r="1.5" fill="var(--paper-bright)" />
      <circle cx="99" cy="103" r="1.5" fill="var(--paper-bright)" />
      <rect x="76" y="107" width="26" height="3" rx="1.5" fill="var(--paper-bright)" />
      <!-- glowing oven window + rack -->
      <rect x="76" y="114" width="26" height="20" rx="3" fill="#fff8b8" filter="url(#showroom-glow)" class="showroom-oven" />
      <rect x="76" y="122" width="26" height="2" fill="currentColor" />

      <!-- sink basin + faucet -->
      <rect x="146" y="96" width="28" height="6" rx="2" fill="var(--paper-muted)" />
      <path d="M 160 96 L 160 76 Q 160 66 170 66 L 175 66 Q 180 66 180 72 L 180 82" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" />

      <!-- kettle on counter -->
      <rect x="114" y="94" width="22" height="2" fill="currentColor" />

      <rect x="120" y="73" width="10" height="3" rx="1.5" fill="currentColor" />

      <!-- steam from kettle -->

      <path d="M 138 75 Q 143 68 136 60 T 141 45" stroke="var(--paper-muted)" stroke-width="1.5" fill="none" class="showroom-steam" style="--duration: 5.5s; --delay: 2s;" stroke-linecap="round" />

      <!-- window behind sink -->
      <rect x="145" y="25" width="50" height="40" rx="2" stroke="currentColor" stroke-width="3" fill="none" />
      <path d="M 170 25 V 65 M 145 45 H 195" stroke="currentColor" stroke-width="2" />

      <!-- counter stool -->
      <rect x="194" y="110" width="24" height="4"  rx="2" fill="currentColor" />
      <rect x="198" y="114" width="3"  height="46"        fill="currentColor" />
      <rect x="211" y="114" width="3"  height="46"        fill="currentColor" />
      <rect x="196" y="140" width="20" height="2"         fill="currentColor" />

      <!-- pendant lamp cord + shade -->
      <rect x="204" y="0" width="2" height="40" fill="currentColor" />
      <polygon points="194,40 216,40 220,50 190,50" fill="currentColor" />

      <!-- light beam from pendant -->
      <polygon points="190,50 220,50 250,160 160,160" fill="url(#showroom-beam-gradient)" class="showroom-beam" />

      <!-- pendant bulb -->
      <circle cx="205" cy="50" r="4" fill="#fff8b8" filter="url(#showroom-glow)" class="showroom-bulb" style="transform-origin: 205px 50px;" />

      <!-- dust motes in pendant beam -->
      <circle cx="205" cy="130" r="1.2" class="showroom-mote" style="--duration: 6s;   --delay: 0s;   --drift-x: -8px;" />
      <circle cx="185" cy="115" r="1"   class="showroom-mote" style="--duration: 5s;   --delay: 2s;   --drift-x: 12px;" />
      <circle cx="225" cy="100" r="1.2" class="showroom-mote" style="--duration: 7s;   --delay: 3s;   --drift-x: -15px;" />
      <circle cx="195" cy="145" r="0.8" class="showroom-mote" style="--duration: 4.5s; --delay: 1.5s; --drift-x: 5px;" />
    </svg>
  </template>

  <!-- ─── Showroom C · Bedroom ─── -->
  <template data-showroom data-id="bedroom" data-cap="Showroom C · Bedroom">
    <svg viewBox="0 0 280 180" aria-hidden="true" style="--lamp-light:#fff8b8;">
      <defs>
        <!-- diagonal beam — light spills across the bed from a bedside lamp -->
        <linearGradient id="showroom-beam-gradient" x1="1" y1="0" x2="0" y2="1">

      <polygon points="200,85 220,85 280,160 100,160" fill="url(#showroom-beam-gradient)" class="showroom-spooky-beam" />

      <!-- glitching bulb -->
      <circle cx="210" cy="85" r="4" fill="#fff8b8" filter="url(#showroom-glow)" class="showroom-spooky-bulb" style="transform-origin: 210px 85px;" />

      <!-- dust motes caught in the flickering light -->
      <circle cx="210" cy="130" r="1.2" class="showroom-mote" style="--duration: 7s; --delay: 0s; --drift-x: -12px;" />
      <circle cx="180" cy="115" r="1"   class="showroom-mote" style="--duration: 6s; --delay: 2s; --drift-x: -15px;" />
      <circle cx="230" cy="140" r="1.5" class="showroom-mote" style="--duration: 8s; --delay: 3s; --drift-x: -8px;"  />
    </svg>
  </template>

  <script>
    // Showroom picker. Pulls every <template data-showroom>, clones one into
    // #showroom-slot, and writes the caption from data-cap. With no id passed
    // (or an unknown id) it picks randomly from the OTHER showrooms — never
    // the one currently displayed — so "Random" always feels like a switch.
    // Exposed on window so dev tools (e.g. the playground fixture) can drive
    // it via postMessage.
    let currentShowroomId = null;
    window.pickShowroom = function pickShowroom(id) {
      const templates = Array.from(document.querySelectorAll('template[data-showroom]'));
      if (!templates.length) return;

      let pick = id && templates.find(t => t.dataset.id === id);
      if (!pick) {
        // Random pick — exclude the current one when there's a choice.
        const pool = templates.length > 1
          ? templates.filter(t => t.dataset.id !== currentShowroomId)
          : templates;
        pick = pool[Math.floor(Math.random() * pool.length)];
      }

      const slot = document.getElementById('showroom-slot');
      const cap  = document.getElementById('showroom-cap');
      if (!slot || !pick) return;
      slot.replaceChildren(pick.content.cloneNode(true));
      if (cap && pick.dataset.cap) cap.textContent = pick.dataset.cap;
      currentShowroomId = pick.dataset.id || null;
    };

    // Playground harness drives this via postMessage:
    //   iframe.contentWindow.postMessage({ type: 'tsic.showroom', id: 'kitchen' }, '*')
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'tsic.showroom') window.pickShowroom(e.data.id);
    });

    window.pickShowroom();

    (function boot() {
      if (!window.tsic || typeof tsic.bootMenu !== 'function') { setTimeout(boot, 16); return; }
      tsic.bootMenu(function (ctx) {
        function nav(screen) {
          return () => tsic.publishMessage('UI.Cmd.Menu.Navigate', { Screen: screen });
        }
        document.getElementById('btn-start').onclick    = nav('NewStore');
        document.getElementById('btn-load').onclick     = nav('LoadSave');
        document.getElementById('btn-mods').onclick     = nav('Mods');
        document.getElementById('btn-settings').onclick = nav('Settings');
        document.getElementById('btn-credits').onclick  = nav('Credits');
        document.getElementById('btn-exit').onclick     = () =>
          tsic.publishMessage('UI.Cmd.Menu.Exit', {});

        // Dev/testing: reveal + wire the "Join Game (Dev)" button. The
        // UI.State.DevMode flag is cached, so this fires with the current
        // value as soon as we subscribe.
        var devJoin = document.getElementById('btn-dev-join');
        if (devJoin) {
          devJoin.onclick = () => tsic.publishMessage('UI.Cmd.Dev.JoinGame', {});
          tsic.on('tsic.msg.UI.State.DevMode', (p) => {
            devJoin.style.display = (p && p.bDevBuild) ? '' : 'none';
          });
        }
      });
    })();
  </script>
</body></html>
