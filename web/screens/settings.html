<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="tsic-screen" content="Settings">
  <meta name="tsic-input-mode" content="InputMode.Menu.Settings">
  <meta name="tsic-cancel-cmd" content="UI.Cmd.Settings.Back">
  <meta name="tsic-focus" content="enabled">
  <meta name="tsic-action-bar-context" content='[]'>
  <title>Settings</title>
  <link rel="stylesheet" href="/shared/base.css">
  <link rel="stylesheet" href="/shared/components.css">
  <script src="/shared/tsic-bridge.js" defer></script>
  <script src="/shared/tsic-runtime.js" defer></script>
  <script src="/shared/store-maze.js" defer></script>
  <script src="/shared/store-maze-stage.js" defer></script>
  <script src="/shared/icons.js" defer></script>
  <script src="/shared/router.js" defer></script>
  <script src="/shared/tsic-focus.js" defer></script>
  <script src="/shared/tsic-dropdown.js" defer></script>
  <script src="/screens/settings.js" defer></script>
  <style>
    /* Fixed-height content viewport: the body is the same height on every tab
       (clamped across viewport sizes), so switching tabs never resizes the cover or
       jumps the footer — short pages pad out, the binding tabs scroll internally.
       Sized so the two-column binding grid shows (nearly) the whole list at 1080p.
       Right padding is trimmed (vs the 22px left) and a stable scrollbar gutter is
       reserved so the rebind controls' right edge lines up with the masthead margin
       instead of being pushed inward by the scrollbar — and stays put whether or
       not a tab actually scrolls. */
    .settings-body { padding: 4px 12px 14px 22px; height: 62vh; min-height: 320px; max-height: 720px; overflow-y: auto; overflow-x: hidden; scrollbar-gutter: stable; }
    #page { padding-bottom: 18px; }
    /* Tab strip is shared — see .tsic-tab / [data-tsic-tab-bar] in tsic-ui.css. */

    .group { margin-bottom: 22px; }
    .group h3 {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin: 0 0 6px;
      padding-bottom: 3px;
      border-bottom: 2px dashed var(--ink-mute);
    }
    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed var(--ink-mute);
      gap: 16px;
    }
    .field label {
      flex: 1;
      color: var(--ink-night);
      font-family: var(--font-body);
      font-size: 14px;
    }
    .field-control { display: flex; align-items: center; gap: 8px; }
    .field input[type=range] {
      width: 240px;
      accent-color: var(--mag-red);
    }
    .field select {
      background: var(--paper-bright);
      color: var(--ink-night);
      border: 1px solid var(--ink-night);
      padding: 3px 8px;
      font-family: inherit;
    }
    .field .value-label {
      color: var(--ink-soft);
      min-width: 36px;
      text-align: right;
      font-family: var(--font-terminal);
      font-size: 13px;
    }
    /* Toggle pill — dark ink track, paper-cream knob, magazine red when on. */
    .field-toggle {
      width: 44px; height: 22px;
      background: var(--ink-mute);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 120ms linear;
    }
    .field-toggle.on { background: var(--mag-red); }
    .field-toggle::after {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 16px; height: 16px;
      background: var(--paper-cream);
      border-radius: 50%;
      transition: left 120ms linear;
    }
    .field-toggle.on::after { left: 25px; }
    .field-toggle.disabled { background: var(--paper-muted); cursor: not-allowed; }
    .field-toggle { outline: none; }
    html:is([data-tsic-input="Gamepad"], [data-tsic-kbnav]) .field-toggle[data-tsic-focused] {
      outline: 2px solid var(--mag-red); outline-offset: 2px;
    }
    html:is([data-tsic-input="Gamepad"], [data-tsic-kbnav]) .bind-btn:not(.locked)[data-tsic-focused] {
      background: var(--mag-yellow);
    }
    .field-rebind {
      background: var(--paper-bright);
      color: var(--ink-night);
      border: 1px solid var(--ink-night);
      padding: 3px 12px;
      cursor: pointer;
      min-width: 120px;
      font-family: var(--font-body);
    }
    .field-rebind:hover { background: var(--mag-yellow); }
    .field-rebind.waiting { background: var(--mag-red); color: var(--paper-cream); border-color: var(--mag-red); }

    /* Status bar above the row-buttons: settings apply instantly, so this only
       carries the restart-required notice. A solid bar (background + rule) so
       it reads as anchored to the panel; height is reserved so the notice
       appearing or clearing never shifts the footer rows. */
    .settings-status {
      padding: 8px 22px;
      min-height: 34px;
      display: flex;
      gap: 10px;
      align-items: center;
      font-family: var(--font-terminal);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--paper-bright);
      border-top: 2px solid var(--ink-night);
    }
    .settings-status [hidden] { display: none; }
    #restart-required { color: var(--mag-red); }

    /* Device binding tabs (Keyboard & Mouse / Controller) — receipt-style rows:
       name (+description), dotted leader, fixed Mode and Binding columns. Fixed
       column widths + ellipsized text mean content can NEVER widen the layout —
       at small window sizes the cover clamps (max-width 92vw) and only the name
       column shrinks. Column captions in the sticky toolbar share the same fixed
       widths so they line up over the row cells. */
    .bindings-toolbar {
      position: sticky; top: 0; z-index: 3;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 110px 148px;
      align-items: center; column-gap: 10px;
      padding: 4px 0 6px;
      background: var(--paper-cream);
      border-bottom: 2px solid var(--ink-night);
    }
    .bindings-toolbar .col-caption {
      font-family: var(--font-display); font-size: 10px; font-weight: 800;
      letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft);
      text-align: center;
    }
    #binding-search {
      background: var(--paper-bright); color: var(--ink-night);
      border: 1px solid var(--ink-night);
      padding: 4px 10px; max-width: 260px;
      font-family: var(--font-body); font-size: 13px;
    }
    .binding-group h3 { position: sticky; top: 33px; z-index: 2; background: var(--paper-cream); }
    .binding-row {
      display: grid;
      grid-template-columns: minmax(0, max-content) minmax(24px, 1fr) 110px 148px;
      align-items: center; column-gap: 10px;
      padding: 6px 0;
    }
    .binding-row[hidden] { display: none; }
    .binding-name {
      min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--ink-night); font-family: var(--font-body); font-size: 14px;
    }
    .binding-leader { border-bottom: 2px dotted var(--ink-mute); height: 1px; align-self: center; margin-top: 8px; }
    .mode-cell { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .mode-cell .mode-word { font-family: var(--font-terminal); font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-soft); }
    .bind-cell { display: flex; justify-content: center; }
    .bind-btn { display:inline-flex; align-items:center; gap:6px; background: var(--paper-bright); color: var(--ink-night);
            border:1px solid var(--ink-night); padding: 2px 10px; cursor:pointer; width: 140px; justify-content:center;
            font-family: var(--font-body); overflow: hidden; }
    .bind-btn:not(.locked):hover { background: var(--mag-yellow); }
    .bind-btn.waiting { background: var(--mag-red); color: var(--paper-cream); border-color: var(--mag-red); }
    .bind-btn.locked { opacity: 0.4; cursor: default; }
    .bind-btn.conflict { border-color: var(--mag-red); color: var(--mag-red); box-shadow: inset 0 0 0 1px var(--mag-red); }
    .bind-btn img { width: 20px; height: 20px; }
    .bind-btn .key-text { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shared-note { color: var(--cat-ink-soft); font-size: 11px; margin-left: 6px; }
    /* Shared by the rebind-capture modal and the Apply/Revert popovers. */
    .settings-modal { position: fixed; inset: 0; display:flex; align-items:center; justify-content:center;
            background: rgba(0,0,0,0.45); z-index: 50; }
    .settings-modal[hidden] { display: none; }
    .settings-modal .panel { background: var(--cat-bg); color: var(--cat-ink-dark); border: 1px solid var(--cat-border);
            padding: 24px 32px; min-width: 320px; text-align:center; box-shadow: var(--cat-shadow-soft); }
    .settings-modal .panel .msg { margin-bottom: 16px; }
    .settings-modal .panel .msg .sub {
      margin-top: 8px;
      font-family: var(--font-terminal);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cat-ink-soft);
    }
    .settings-modal .panel .msg .sub b { color: var(--mag-red); }
  </style>
</head><body>
  <div class="tsic-stage--magazine-gradient">
    <div class="tsic-panel tsic-cover" style="--tsic-cover-width: 900px;">
      <div class="tsic-masthead">
        <div class="tsic-masthead-title">
          <em>The Fine</em>
          Print.
        </div>
        <div class="tsic-masthead-meta">
          <span class="tsic-masthead-issue">Dept. 88</span>
          <span class="tsic-masthead-date">Shopping, your way.</span>
        </div>
      </div>

      <div class="settings-body">
        <div id="tabs" class="tsic-tab-strip" data-tsic-tab-bar></div>
        <div id="page" data-tsic-focus-group="setting-list">Loading…</div>
      </div>

      <div class="settings-status">
        <span id="restart-required" hidden>Restart required</span>
      </div>

      <div class="tsic-cover-rows" data-tsic-focus-group="actions">
        <button class="tsic-row-button" id="btn-back" data-tsic-initial-focus>
          <span class="tsic-row-dept">Fire Exit</span>
          Back to Main
          <span class="tsic-row-pg">PG. 01</span>
        </button>
        <button class="tsic-row-button" id="btn-reset">
          <span class="tsic-row-dept">Dept. 88</span>
          Reset to Defaults
          <span class="tsic-row-pg">RESET</span>
        </button>
      </div>
    </div>
  </div>
</body></html>
