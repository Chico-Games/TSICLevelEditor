<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="tsic-screen" content="Screen">
  <meta name="tsic-input-mode" content="InputMode.Menu.Generic">
  <meta name="tsic-focus" content="enabled">
  <meta name="tsic-action-bar-context" content='[]'>
  <title>Terminal</title>
  <link rel="stylesheet" href="/shared/base.css">
  <link rel="stylesheet" href="/shared/components.css">
    <script src="/shared/tsic-bridge.js" defer></script>
  <script src="/shared/tsic-runtime.js" defer></script>
  <script src="/shared/router.js" defer></script>
  <script src="/shared/tsic-focus.js" defer></script>
  <script src="/shared/lore.js" data-kind="Screen" defer></script>
  <style>
    #screen-root  { position:fixed; inset:0; background: rgba(35,31,24,0.75); color: #92e0a8; font-family: 'Consolas', monospace; display:flex; align-items:center; justify-content:center; }
    #screen-frame { width: 720px; max-height: 80vh; padding: 24px 28px; border: 1px solid #2a3a30; background: rgba(8, 16, 12, 0.92); box-shadow: inset 0 0 60px rgba(50, 220, 100, 0.08); overflow:auto; }
    #lore-group  { font-size: 11px; letter-spacing: 4px; color: rgba(146,224,168,0.6); margin-bottom: 12px; }
    #lore-heading{ font-size: 18px; margin: 0 0 14px; color:#bbf5c5; }
    #lore-body   { white-space: pre-wrap; font-size: 13px; line-height: 1.55; }
    #lore-body::after { content:'▌'; animation: blink 900ms steps(2,end) infinite; margin-left:2px; }
    @keyframes blink { 50% { opacity: 0; } }
    #lore-controls { display:flex; gap:8px; margin-top: 18px; justify-content:flex-end; align-items:center; }
    #lore-pageinfo { color: rgba(146,224,168,0.55); font-size: 11px; margin-right: 6px; }
    #lore-index-list { display:flex; flex-wrap:wrap; gap:6px; margin: 12px 0; font-size: 11px; max-height: 80px; overflow:auto; }
    .lore-index { padding: 2px 6px; border: 1px solid rgba(140,220,160,0.3); cursor:pointer; }
    .lore-index:hover { background: rgba(60,180,90,0.15); }
    .lore-index.current { background: rgba(60,180,90,0.25); }
  </style>
</head><body>
  <div id="screen-root">
    <div id="screen-frame">
      <div id="lore-group"></div>
      <h1 id="lore-heading"></h1>
      <div id="lore-body"></div>
      <div id="lore-index-list"></div>
      <div id="lore-controls">
        <span id="lore-pageinfo"></span>
        <button class="tsic-button" id="lore-prev">‹ Prev</button>
        <button class="tsic-button" id="lore-next">Next ›</button>
        <button class="tsic-button" id="lore-close">Close</button>
      </div>
    </div>
  </div>
</body></html>
