<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="tsic-screen" content="BugReport">
  <meta name="tsic-input-mode" content="InputMode.Menu.Generic">
  <meta name="tsic-cancel-cmd" content="UI.Cmd.BugReport.Close">
  <meta name="tsic-focus" content="enabled">
  <title>Bug Report</title>
  <link rel="stylesheet" href="/shared/base.css">
  <link rel="stylesheet" href="/shared/components.css">
  <link rel="stylesheet" href="/shared/screen-manager.css">
  <script src="/shared/router.js" defer></script>
  <script src="/shared/tsic-bridge.js" defer></script>
  <script src="/shared/tsic-runtime.js" defer></script>
  <script src="/shared/tsic-focus.js" defer></script>
  <script src="/shared/tsic-dropdown.js" defer></script>
  <script src="/shared/screen-manager.js" defer></script>
  <script src="/shared/screens/bug-report.js" defer></script>
</head>
<body>
  <script>
    // Standalone bootstrap: when this page is loaded directly (tests/playground)
    // there's no SPA shell driving the screen manager, so nudge screen-manager
    // to mount the registered BugReport screen. In the live SPA the in-game.html
    // shell drives this; see terminal.html for the same pattern.
    (function boot() {
      if (!window.tsic || !window.TSIC || !TSIC.__screenManagerInstalled) { setTimeout(boot, 16); return; }
      if (document.querySelector('#screen-overlay-host [data-screen="BugReport"]')) return;
      window.tsic.publishMessage('tsic.msg.UI.Screen.Changed', { Name: 'BugReport' });
      setTimeout(boot, 16);
    })();
  </script>
</body></html>
