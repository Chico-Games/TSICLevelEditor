<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="tsic-screen" content="Tablet">
  <meta name="tsic-input-mode" content="InputMode.Menu.Generic">
  <meta name="tsic-focus" content="enabled">
  <meta name="tsic-action-bar-context" content='[]'>
  <title>Tablet</title>
  <link rel="stylesheet" href="/shared/base.css">
  <link rel="stylesheet" href="/shared/components.css">
    <script src="/shared/tsic-bridge.js" defer></script>
  <script src="/shared/tsic-runtime.js" defer></script>
  <script src="/shared/router.js" defer></script>
  <script src="/shared/tsic-focus.js" defer></script>
  <script src="/shared/lore.js" data-kind="Tablet" defer></script>
  <style>
    #tab-frame  { width: 480px; max-height: 80vh; background: var(--cat-paper-panel); color: var(--cat-ink-dark); border-radius: 16px; border: 6px solid #1c1f26; box-shadow: 0 18px 60px rgba(35,31,24,0.45); padding: 24px; display:flex; flex-direction:column; gap:10px; overflow:hidden; }
    #lore-group  { font-size: 10px; letter-spacing: 3px; color: rgba(59,47,28,0.55); text-transform: uppercase; }
    #lore-heading{ font-size: 18px; margin: 0; }
    #lore-body   { flex:1; overflow:auto; white-space: pre-wrap; font-size: 13px; line-height: 1.55; }
    #lore-index-list { display:flex; flex-direction:column; gap:2px; margin-top: 6px; font-size: 11px; max-height: 80px; overflow:auto; }
    .lore-index { padding: 2px 6px; cursor:pointer; border-radius:3px; }
    .lore-index:hover { background: rgba(241,229,207,0.32); }
    .lore-index.current { background: rgba(241,229,207,0.55); }
    #lore-controls { display:flex; gap:8px; justify-content:flex-end; align-items:center; }
    #lore-pageinfo { color: rgba(59,47,28,0.55); font-size: 11px; margin-right: 6px; }
  </style>
</head><body>
  <div id="tab-root" class="tsic-modal-scrim tsic-modal-scrim--dim">
    <div id="tab-frame">
      <div id="lore-group"></div>
      <h1 id="lore-heading"></h1>
      <div id="lore-body"></div>
      <div id="lore-index-list"></div>
      <div id="lore-controls">
        <span id="lore-pageinfo"></span>
        <button class="tsic-button" id="lore-prev">‹ Prev</button>
        <button class="tsic-button" id="lore-next">Next ›</button>
        <button class="tsic-button" id="lore-close">Close</button>
      </div>
    </div>
  </div>
</body></html>
