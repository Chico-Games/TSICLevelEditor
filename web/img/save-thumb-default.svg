  <rect x="0" y="0" width="168" height="112" fill="none" stroke="#211f1a" stroke-width="2"/>
  <!-- storefront awning -->
  <g stroke="#211f1a" stroke-width="2" fill="none">
    <rect x="44" y="34" width="80" height="44" fill="#e6e0d2"/>
    <path d="M40 34 h88 l-6 -12 h-76 z" fill="#b8442c"/>
    <path d="M52 22 v12 M64 22 v12 M76 22 v12 M88 22 v12 M100 22 v12 M112 22 v12"/>
    <!-- door + window -->
